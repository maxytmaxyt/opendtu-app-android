name: Build & Release APK

on:
  workflow_dispatch:
    inputs:
      clean:
        description: "Perform clean build"
        required: false
        type: boolean
        default: false

  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Generate Gradle Wrapper (if missing)
        if: "!startsWith(github.ref, 'refs/tags/')"
        run: |
          if [ ! -f "gradlew" ]; then
            echo "Wrapper fehlt → lade Gradle 8.6..."
            wget -q https://services.gradle.org/distributions/gradle-8.6-bin.zip -O /tmp/gradle.zip
            unzip -q /tmp/gradle.zip -d /tmp/
            /tmp/gradle-8.6/bin/gradle wrapper --gradle-version 8.6
            rm -rf /tmp/gradle-8.6 /tmp/gradle.zip
            echo "Wrapper generiert."
          else
            echo "Wrapper bereits vorhanden."
          fi

      - name: Commit Gradle Wrapper (if newly created)
        if: "!startsWith(github.ref, 'refs/tags/')"
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "github-actions"
            git config user.email "actions@github.com"
            git add gradlew gradlew.bat gradle/wrapper/
            git commit -m "ci: add Gradle wrapper"
            git push
          fi

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Clean build (optional)
        if: ${{ github.event.inputs.clean == 'true' }}
        run: ./gradlew clean

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Rename APK
        run: mv app/build/outputs/apk/release/app-release.apk app-release.apk

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
