name: Build & Release APK

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"


permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Install Gradle (for wrapper generation)
        run: sudo apt-get update && sudo apt-get install -y gradle

      - name: Generate Gradle Wrapper if missing
        run: |
          if [ ! -f "gradlew" ]; then
            gradle wrapper
          fi

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Commit Gradle Wrapper (if new)
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "github-actions"
            git config user.email "actions@github.com"
            git add gradlew gradlew.bat gradle/wrapper/*
            git commit -m "Add Gradle Wrapper"
            git push
          fi

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Rename APK
        run: |
          mv app/build/outputs/apk/release/app-release.apk app-release.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
