name: Build & Release APK

on:
  workflow_dispatch:
    inputs:
      clean:
        description: "Clean build durchführen"
        required: false
        type: boolean
        default: false
      release:
        description: "GitHub Release erstellen"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"
          

      - name: Cache Gradle (eigener Cache)
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Download gradle-wrapper.jar (if missing)
        run: |
          if [ ! -f "gradle/wrapper/gradle-wrapper.jar" ]; then
            echo "gradle-wrapper.jar fehlt → lade herunter..."
            mkdir -p gradle/wrapper
            wget -q "https://github.com/gradle/gradle/raw/v8.7.0/gradle/wrapper/gradle-wrapper.jar" \
              -O gradle/wrapper/gradle-wrapper.jar
            echo "Fertig."
          else
            echo "gradle-wrapper.jar bereits vorhanden."
          fi

      - name: Commit gradle-wrapper.jar (if newly added)
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "github-actions"
            git config user.email "actions@github.com"
            git add gradle/wrapper/gradle-wrapper.jar
            git commit -m "ci: add gradle-wrapper.jar"
            git push
          fi

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Generate debug keystore
        run: |
          mkdir -p ~/.android
          if [ ! -f ~/.android/debug.keystore ]; then
            keytool -genkeypair \
              -keystore ~/.android/debug.keystore \
              -alias androiddebugkey \
              -keyalg RSA -keysize 2048 \
              -validity 10000 \
              -storepass android \
              -keypass android \
              -dname "CN=Android Debug,O=Android,C=US"
          fi

      - name: Build Release APK
        run: |
          if [ "${{ github.event.inputs.clean }}" == "true" ]; then
            echo "Clean build..."
            ./gradlew clean assembleRelease
          else
            ./gradlew assembleRelease
          fi

      - name: Rename APK
        run: mv app/build/outputs/apk/release/app-release.apk app-release.apk

      - name: Create GitHub Release
        if: ${{ github.event.inputs.release == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ github.run_number }}"
          name: "Build #${{ github.run_number }}"
          files: app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
